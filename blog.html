<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Beauty Blog — Tips, Routines & Product Reviews | K Beauty Premium</title>
<meta name="description" content="Expert K-beauty guides, Korean skincare routines, product reviews, and ingredient breakdowns. Your go-to resource for all things Korean beauty.">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<style>
.blog-hero { max-width: 900px; margin: 30px auto 20px; padding: 0 16px; text-align: center; }
.blog-hero h1 { font-family: 'Noto Serif Display', serif; font-size: 2.2rem; font-weight: 700; }
.blog-hero p { color: var(--text-mid); font-size: 0.95rem; margin-top: 8px; max-width: 600px; margin-left: auto; margin-right: auto; }
.blog-grid { max-width: 900px; margin: 20px auto; padding: 0 16px; display: grid; grid-template-columns: 1fr; gap: 28px; }
.blog-card { display: grid; grid-template-columns: 280px 1fr; gap: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
.blog-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
.blog-card-img { width: 100%; height: 200px; object-fit: cover; background: var(--warm-cream); }
.blog-card-img img { width: 100%; height: 100%; object-fit: cover; }
.blog-card-body { padding: 20px 20px 20px 0; display: flex; flex-direction: column; justify-content: center; }
.blog-card-date { font-size: 0.72rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
.blog-card-title { font-family: 'Noto Serif Display', serif; font-size: 1.3rem; font-weight: 600; margin: 6px 0 8px; color: var(--text); line-height: 1.3; }
.blog-card-excerpt { font-size: 0.88rem; color: var(--text-mid); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.blog-card-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.blog-tag { font-size: 0.68rem; background: var(--accent-light); color: var(--accent); padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.blog-empty { text-align: center; padding: 60px 20px; color: var(--text-light); }
.blog-loading { text-align: center; padding: 60px 20px; color: var(--text-light); }
@media (max-width: 768px) {
  .blog-card { grid-template-columns: 1fr; }
  .blog-card-body { padding: 16px; }
  .blog-card-title { font-size: 1.1rem; }
  .blog-hero h1 { font-size: 1.6rem; }
}
</style>
</head>
<body>
<div id="siteHeader"></div>
<div id="siteNav"></div>

<div class="blog-hero">
  <h1>The K-Beauty Blog</h1>
  <p>Expert guides, product reviews, routine tips, and everything you need to know about Korean skincare and beauty.</p>
</div>

<div class="blog-grid" id="blogGrid">
  <div class="blog-loading">Loading posts...</div>
</div>

<div id="siteFooter"></div>

<script src="/shared.js"></script>
<script>
async function loadBlogPosts() {
  renderHeader();
  renderNav("blog");
  renderFooter();

  var grid = document.getElementById("blogGrid");
  try {
    var resp = await fetch("/data/blog.json");
    if (!resp.ok) throw new Error("No blog data");
    var posts = await resp.json();
    
    // Sort by date descending
    // Hide drafts from public view
    posts = posts.filter(function(p) { return p.status !== "draft"; });
    posts.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
    
    if (posts.length === 0) {
      grid.innerHTML = '<div class="blog-empty"><h3>Coming Soon</h3><p>We\'re working on amazing K-beauty content. Stay tuned!</p></div>';
      return;
    }

   // Helpers to handle cover as string OR object (backwards compat)
    function getCoverUrl(cover) {
      if (typeof cover === "string") return cover;
      if (cover && cover.url) return cover.url;
      return "";
    }
    function getCoverPosition(cover) {
      if (cover && typeof cover === "object" && cover.position) return cover.position;
      return "center";
    }

    grid.innerHTML = posts.map(function(post) {
      var coverUrl = getCoverUrl(post.cover);
      var coverPos = getCoverPosition(post.cover);
      var coverHTML = coverUrl 
        ? '<div class="blog-card-img"><img src="' + coverUrl + '" alt="' + post.title.replace(/"/g, "&quot;") + '" loading="lazy" style="object-position:center ' + coverPos + ';"></div>' 
        : '<div class="blog-card-img" style="display:flex;align-items:center;justify-content:center;font-size:3rem;">📝</div>';
      var tagsHTML = (post.tags || []).map(function(t) { return '<span class="blog-tag">' + t + '</span>'; }).join("");
      var dateStr = post.date ? new Date(post.date).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" }) : "";
      return '<a href="/blog/' + post.slug + '" class="blog-card" style="text-decoration:none;color:inherit;">' +
        coverHTML +
        '<div class="blog-card-body">' +
          '<div class="blog-card-date">' + dateStr + '</div>' +
          '<div class="blog-card-title">' + post.title + '</div>' +
          '<div class="blog-card-excerpt">' + (post.excerpt || "") + '</div>' +
          (tagsHTML ? '<div class="blog-card-tags">' + tagsHTML + '</div>' : '') +
        '</div>' +
      '</a>';
    }).join("");
  } catch(e) {
    grid.innerHTML = '<div class="blog-empty"><h3>Coming Soon</h3><p>We\'re working on amazing K-beauty content. Stay tuned!</p></div>';
  }
}
loadBlogPosts();
</script>
</body>
</html>
