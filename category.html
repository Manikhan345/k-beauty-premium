<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category — K Beauty Premium</title>
<meta name="description" content="Shop the best Korean beauty products. Top-rated K-beauty picks curated for every skin type.">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<style>
.breadcrumb { max-width: 1200px; margin: 16px auto 0; padding: 0 16px; font-size: 0.8rem; color: var(--text-light); }
.breadcrumb a { color: var(--accent); text-decoration: none; cursor: pointer; }
.breadcrumb a:hover { text-decoration: underline; }
.category-title { max-width: 1200px; margin: 16px auto 0; padding: 0 16px; display: flex; justify-content: space-between; align-items: baseline; }
.category-title h2 { font-family: 'Noto Serif Display', serif; font-size: 1.8rem; font-weight: 700; }
.category-title .result-count { font-size: 0.85rem; color: var(--text-light); }

.page-layout { max-width: 1200px; margin: 20px auto 0; padding: 0 16px; display: grid; grid-template-columns: 220px 1fr; gap: 24px; }

/* LEFT SIDEBAR */
.left-sidebar { display: flex; flex-direction: column; gap: 0; }
.filter-section { border-bottom: 1px solid var(--border); padding: 14px 0; }
.filter-section:first-child { padding-top: 0; }
.filter-section-title { font-size: 0.78rem; font-weight: 700; color: var(--text); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.filter-link { display: block; padding: 4px 0; font-size: 0.82rem; color: var(--text-mid); cursor: pointer; transition: color 0.15s; text-decoration: none; }
.filter-link:hover { color: var(--accent); }
.filter-link.active { color: var(--accent); font-weight: 600; }
.filter-link.active::before { content: "› "; color: var(--accent); }
.filter-sub-links { padding-left: 14px; margin-top: 2px; }
.filter-sub-link { display: block; padding: 3px 0; font-size: 0.78rem; color: var(--text-light); cursor: pointer; transition: color 0.15s; text-decoration: none; }
.filter-sub-link:hover { color: var(--accent); }
.filter-sub-link.active { color: var(--accent); font-weight: 600; }
.filter-sub-link.active::before { content: "› "; color: var(--accent); }
.filter-option { display: flex; align-items: center; gap: 8px; padding: 3px 0; cursor: pointer; font-size: 0.82rem; color: var(--text); }
.filter-option input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; }
.sort-link { display: block; padding: 4px 0; font-size: 0.82rem; color: var(--text-mid); cursor: pointer; transition: color 0.15s; text-decoration: none; }
.sort-link:hover { color: var(--accent); }
.sort-link.active { color: var(--accent); font-weight: 600; }
.sort-link.active::before { content: "› "; color: var(--accent); }

/* RIGHT CONTENT */
.right-content { min-width: 0; }
.product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

/* TOP RATED */
.top-product { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); align-items: center; }
.top-product:last-child { border-bottom: none; }
.top-rank { font-size: 1.1rem; font-weight: 700; color: var(--accent); min-width: 22px; }
.top-info { flex: 1; }
.top-info .name { font-size: 0.78rem; font-weight: 500; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.top-info .price { font-size: 0.82rem; font-weight: 700; color: var(--text); margin-top: 2px; }
.top-info .mini-stars { color: var(--gold); font-size: 0.65rem; }

.grid-loading { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.grid-loading-card { height: 360px; background: linear-gradient(110deg, var(--warm-cream) 8%, #f8f4ef 18%, var(--warm-cream) 33%); border-radius: 10px; background-size: 200% 100%; animation: shimmer 1.5s linear infinite; }
@keyframes shimmer { to { background-position-x: -200%; } }

.not-found { max-width: 600px; margin: 80px auto; padding: 0 16px; text-align: center; }
.not-found h2 { font-family: 'Noto Serif Display', serif; font-size: 1.6rem; margin-bottom: 12px; }
.not-found p { color: var(--text-mid); margin-bottom: 20px; }

@media (max-width: 1024px) { .product-grid, .grid-loading { grid-template-columns: repeat(3, 1fr); } }
.mobile-filter-toggle { display: none; max-width: 1200px; margin: 10px auto 0; padding: 0 16px; }
.mobile-filter-btn { padding: 10px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; font-family: 'Outfit', sans-serif; color: var(--text-mid); cursor: pointer; width: 100%; text-align: center; font-weight: 500; }
.mobile-filter-btn:active { background: var(--accent-light); }

@media (max-width: 768px) {
  .page-layout { grid-template-columns: 1fr; }
  .left-sidebar { display: none; border: 1px solid var(--border); border-radius: 10px; padding: 16px; background: var(--card); margin-bottom: 12px; order: -1; }
  .left-sidebar.open { display: block; }
  .product-grid, .grid-loading { grid-template-columns: repeat(2, 1fr) !important; }
  .category-title h2 { font-size: 1.3rem; }
  .mobile-filter-toggle { display: flex !important; }
}
@media (max-width: 320px) { .product-grid, .grid-loading { grid-template-columns: 1fr !important; } }
</style>
</head>
<body>
<div id="siteHeader"></div>
<div id="siteNav"></div>
<div class="breadcrumb" id="breadcrumb"><a href="/">Home</a> › <span>Loading...</span></div>
<div class="category-title"><h2 id="catTitle">Loading...</h2><span class="result-count" id="resultCount">Loading...</span></div>

<div class="mobile-filter-toggle">
  <button class="mobile-filter-btn" onclick="toggleMobileFilters()">☰</button>
</div>

<div id="mainContent">
  <div class="page-layout">
    <div class="left-sidebar" id="leftSidebar">
      <!-- Department / Tags - rendered by JS -->
      <div class="filter-section" id="filterTags"><div class="filter-section-title">Department</div><p style="color:var(--text-light);font-size:0.8rem;">Loading...</p></div>
      <!-- Sort -->
      <div class="filter-section" id="filterSort">
        <div class="filter-section-title">Sort By</div>
        <a class="sort-link active" data-sort="popular" onclick="sortProducts('popular', this)">Popular</a>
        <a class="sort-link" data-sort="price-low" onclick="sortProducts('price-low', this)">Price: Low to High</a>
        <a class="sort-link" data-sort="price-high" onclick="sortProducts('price-high', this)">Price: High to Low</a>
        <a class="sort-link" data-sort="rating" onclick="sortProducts('rating', this)">Top Rated</a>
        <a class="sort-link" data-sort="new" onclick="sortProducts('new', this)">Newest</a>
      </div>
      <!-- Price -->
      <div class="filter-section">
        <div class="filter-section-title">Price</div>
        <div class="filter-option"><input type="checkbox" id="f1" onchange="applyFilters()"> Under $10</div>
        <div class="filter-option"><input type="checkbox" id="f2" onchange="applyFilters()"> $10 — $20</div>
        <div class="filter-option"><input type="checkbox" id="f3" onchange="applyFilters()"> $20 — $30</div>
        <div class="filter-option"><input type="checkbox" id="f4" onchange="applyFilters()"> Over $30</div>
      </div>
      <!-- Rating -->
      <div class="filter-section">
        <div class="filter-section-title">Avg. Customer Review</div>
        <div class="filter-option"><input type="checkbox" id="r1" onchange="applyFilters()"> ★★★★★ 4.5 & up</div>
        <div class="filter-option"><input type="checkbox" id="r2" onchange="applyFilters()"> ★★★★☆ 4.0 & up</div>
      </div>
      <!-- Top Rated -->
      <div class="filter-section">
        <div class="filter-section-title">🏆 Top Rated</div>
        <div id="topRated"><p style="color:var(--text-light);font-size:0.82rem;">Loading...</p></div>
      </div>
    </div>

    <div class="right-content">
      <div class="product-grid" id="productGrid">
        <div class="grid-loading" style="grid-column:1/-1;display:grid;">
          <div class="grid-loading-card"></div><div class="grid-loading-card"></div>
          <div class="grid-loading-card"></div><div class="grid-loading-card"></div>
          <div class="grid-loading-card"></div><div class="grid-loading-card"></div>
          <div class="grid-loading-card"></div><div class="grid-loading-card"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="siteFooter"></div>

<script src="/shared.js"></script>
<script src="/category.js"></script>
<script>
function toggleMobileFilters() {
  var sidebar = document.getElementById("leftSidebar");
  sidebar.classList.toggle("open");
  var btn = document.querySelector(".mobile-filter-btn");
  btn.textContent = sidebar.classList.contains("open") ? "✕" : "☰";
}
var CATEGORY_KEY = "";
var path = window.location.pathname.replace(/^\//, "").replace(/\/$/, "");
if (path) CATEGORY_KEY = path;

async function init() {
  await loadConfig();
  if (!CATEGORY_KEY || !CATEGORY_META[CATEGORY_KEY]) {
    document.getElementById("mainContent").innerHTML = '<div class="not-found"><h2>Category Not Found</h2><p>This category does not exist.</p><a href="/" style="color:var(--accent);">← Back to Home</a></div>';
    document.getElementById("catTitle").textContent = "Not Found";
    document.getElementById("breadcrumb").innerHTML = '<a href="/">Home</a> › <span>Not Found</span>';
    renderHeader();
    renderNav("", "");
    renderFooter();
    return;
  }
  renderHeader();
  renderNav(CATEGORY_KEY, "filterCategoryProducts");
  renderFooter();
}
init();
</script>
</body>
</html>
