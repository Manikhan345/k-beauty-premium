<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K Beauty Premium — Korean Skincare & Beauty Products</title>
<meta name="description" content="Shop the best Korean beauty and skincare products. Top-rated K-beauty picks curated for every skin type.">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }
.category-section { margin: 30px 0; background: var(--card); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); animation: fadeUp 0.5s ease-out both; }
.category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 2px solid var(--accent-light); }
.category-header h2 { font-family: 'Noto Serif Display', serif; font-size: 1.4rem; font-weight: 600; }
.category-header a { color: var(--accent); text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: color 0.2s; }
.category-header a:hover { color: var(--accent-dark); }
.product-scroll { display: flex; gap: 16px; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; padding-bottom: 8px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.product-scroll::-webkit-scrollbar { height: 4px; }
.product-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.product-scroll .product-card { min-width: 220px; max-width: 220px; scroll-snap-align: start; }
.promo { margin: 30px 0; background: linear-gradient(135deg, var(--accent), var(--accent-rose)); border-radius: var(--radius); padding: 40px 30px; text-align: center; color: #fff; }
.promo h2 { font-family: 'Noto Serif Display', serif; font-size: 1.8rem; margin-bottom: 8px; }
.promo p { font-weight: 300; opacity: 0.9; margin-bottom: 16px; }
.promo .cta { display: inline-block; padding: 12px 32px; background: #fff; color: var(--accent-dark); border-radius: 50px; font-weight: 600; text-decoration: none; transition: transform 0.2s; }
.promo .cta:hover { transform: scale(1.05); }
.loading-placeholder { display: flex; gap: 16px; padding: 10px 0; }
.loading-card { min-width: 220px; height: 340px; background: linear-gradient(110deg, var(--warm-cream) 8%, #f8f4ef 18%, var(--warm-cream) 33%); border-radius: 10px; background-size: 200% 100%; animation: shimmer 1.5s linear infinite; }
@keyframes shimmer { to { background-position-x: -200%; } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 768px) { .category-section { padding: 16px; margin: 20px 0; } .category-header h2 { font-size: 1.15rem; } .product-scroll .product-card { min-width: 180px; max-width: 180px; } .promo { padding: 24px 16px; } .promo h2 { font-size: 1.3rem; } }
</style>
</head>
<body>

<!-- These 3 divs are filled by shared.js -->
<div id="siteHeader"></div>
<div id="siteNav"></div>

<main class="container" id="mainContent"></main>

<div id="siteFooter"></div>

<script src="/shared.js"></script>
<script>
renderHeader();

var HOMEPAGE_LIMIT = 5;
async function buildHomepage() {
  await loadConfig();
  renderNav("home");
  renderFooter();

  // Check for search query
  var urlParams = new URLSearchParams(window.location.search);
  var searchQuery = urlParams.get("search");
  if (searchQuery && searchQuery.trim().length >= 2) {
    showSearchResults(searchQuery.trim());
    return;
  }

  var main = document.getElementById("mainContent");
  var categories = Object.keys(CATEGORY_META);
  for (var i = 0; i < categories.length; i++) {
    var key = categories[i], meta = CATEGORY_META[key], pageUrl = SITE_PAGES[key];
    var section = document.createElement("section");
    section.className = "category-section"; section.id = key;
    section.innerHTML = '<div class="category-header"><h2>' + meta.title + '</h2><a href="' + pageUrl + '">View More →</a></div><div class="product-scroll" id="scroll-' + key + '"><div class="loading-placeholder"><div class="loading-card"></div><div class="loading-card"></div><div class="loading-card"></div><div class="loading-card"></div></div></div>';
    main.appendChild(section);
    if (i === 2) {
      var promo = document.createElement("div"); promo.className = "promo";
      promo.innerHTML = '<h2>Your K-Beauty Routine Starts Here</h2><p>Discover the best Korean skincare products loved by millions worldwide</p><a href="' + SITE_PAGES.skincare + '" class="cta">Shop Best Sellers</a>';
      main.appendChild(promo);
    }
  }
  for (var j = 0; j < categories.length; j++) {
    var k = categories[j], m = CATEGORY_META[k];
    var products = await fetchProducts(m.file);
    var container = document.getElementById("scroll-" + k);
    if (products.length > 0) { container.innerHTML = products.slice(0, HOMEPAGE_LIMIT).map(function(p) { return renderProductCard(p, null, k); }).join(""); }
    else { container.innerHTML = '<p style="color:var(--text-light);padding:20px;">No products found.</p>'; }
  }
}

async function showSearchResults(query) {
  var main = document.getElementById("mainContent");
  main.innerHTML = '<div style="max-width:1200px;margin:0 auto;padding:20px 16px;"><h2 style="font-family:Noto Serif Display,serif;font-size:1.6rem;margin-bottom:6px;">Search Results</h2><p style="color:var(--text-light);margin-bottom:20px;">Showing results for "<strong>' + query + '</strong>"</p><div id="searchResultsGrid" class="product-grid" style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;"><p style="color:var(--text-light);grid-column:1/-1;">Searching...</p></div></div>';

  // Fill search input
  var di = document.getElementById("globalSearchInput");
  var mi = document.getElementById("mobileGlobalSearch");
  if (di) di.value = query;
  if (mi) mi.value = query;

  var q = query.toLowerCase();
  var allResults = [];
  var keys = Object.keys(CATEGORY_META);
  for (var i = 0; i < keys.length; i++) {
    var key = keys[i];
    var products = await fetchProducts(CATEGORY_META[key].file);
    products.forEach(function(p) {
      if (p.name.toLowerCase().includes(q) || (p.tag && p.tag.toLowerCase().includes(q)) || (p.subtag && p.subtag.toLowerCase().includes(q)) || key.includes(q)) {
        allResults.push({product: p, cat: key});
      }
    });
  }

  var grid = document.getElementById("searchResultsGrid");
  if (allResults.length === 0) {
    grid.innerHTML = '<p style="color:var(--text-light);grid-column:1/-1;text-align:center;padding:40px;">No products found for "' + query + '". Try a different search term.</p>';
  } else {
    grid.innerHTML = allResults.map(function(r) { return renderProductCard(r.product, null, r.cat); }).join("");
    var countEl = main.querySelector("p");
    if (countEl) countEl.innerHTML = 'Found <strong>' + allResults.length + '</strong> products for "<strong>' + query + '</strong>"';
  }
}
buildHomepage();
</script>
</body>
</html>
