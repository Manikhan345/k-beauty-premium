<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korean Skincare Routine — K Beauty Premium</title>
<meta name="description" content="">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<style>
.routine-container { max-width: 820px; margin: 30px auto; padding: 0 16px; }
.routine-breadcrumb { font-size: 0.8rem; color: var(--text-light); margin-bottom: 20px; }
.routine-breadcrumb a { color: var(--accent); text-decoration: none; }

.routine-hero { background: var(--card); border-radius: 18px; overflow: hidden; box-shadow: 0 8px 30px rgba(26,20,16,0.06); margin-bottom: 30px; border: 1px solid var(--border-soft); }
.routine-hero-img { width: 100%; aspect-ratio: 21/9; background: var(--warm-cream); overflow: hidden; }
.routine-hero-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.routine-hero-content { padding: 28px 32px 32px; }
.routine-hero-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.routine-pill { font-size: 0.72rem; padding: 4px 12px; border-radius: 14px; font-weight: 600; letter-spacing: 0.3px; text-transform: capitalize; }
.routine-pill.skin { background: var(--accent-rose-light); color: var(--accent-dark); }
.routine-pill.time { background: var(--champagne); color: var(--gold-deep); }
.routine-pill.meta { background: var(--warm-cream); color: var(--text-mid); }
.routine-hero h1 { font-family: 'Noto Serif Display', serif; font-size: 2rem; font-weight: 700; line-height: 1.25; color: var(--text); margin-bottom: 14px; }
.routine-intro { font-size: 1rem; line-height: 1.7; color: var(--text-mid); }

.routine-steps { display: flex; flex-direction: column; gap: 20px; }

.step-card { background: var(--card); border-radius: 16px; padding: 24px 26px; box-shadow: 0 4px 16px rgba(26,20,16,0.05); border: 1px solid var(--border-soft); position: relative; }
.step-card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
.step-number { width: 40px; height: 40px; border-radius: 50%; background: var(--gradient-rose); color: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Noto Serif Display', serif; font-size: 1.1rem; font-weight: 700; flex-shrink: 0; box-shadow: 0 4px 12px rgba(183,110,121,0.25); }
.step-title { font-family: 'Noto Serif Display', serif; font-size: 1.3rem; font-weight: 600; color: var(--text); }

.step-body { display: grid; grid-template-columns: 140px 1fr; gap: 22px; align-items: start; }
.step-product-img { width: 140px; height: 140px; border-radius: 12px; background: var(--warm-cream); overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.step-product-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
.step-product-img .empty { font-size: 2rem; color: var(--text-light); }

.step-info { display: flex; flex-direction: column; gap: 10px; min-width: 0; }
.step-product-name { font-size: 1rem; font-weight: 600; color: var(--text); line-height: 1.4; }
.step-why { font-size: 0.92rem; line-height: 1.6; color: var(--text-mid); }
.step-tip { background: var(--accent-rose-light); border-radius: 10px; padding: 10px 14px; font-size: 0.85rem; color: var(--accent-dark); line-height: 1.5; }
.step-tip strong { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700; margin-bottom: 4px; }

.step-footer { display: flex; justify-content: space-between; align-items: center; gap: 14px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border-soft); flex-wrap: wrap; }
.step-wait { font-size: 0.85rem; color: var(--text-mid); font-weight: 500; }
.step-wait strong { color: var(--accent); font-weight: 700; }
.btn-amazon { display: inline-block; padding: 11px 22px; background: linear-gradient(to bottom, #FFD814, #F7CA00); border: 1px solid #C49A00; border-radius: 50px; color: #111; font-size: 0.88rem; font-weight: 700; font-family: 'Outfit', sans-serif; text-decoration: none; cursor: pointer; transition: all 0.2s; }
.btn-amazon:hover { background: linear-gradient(to bottom, #F7CA00, #E8B900); transform: scale(1.03); }

.routine-outro { background: var(--card); border-radius: 16px; padding: 26px 30px; margin-top: 32px; box-shadow: 0 4px 16px rgba(26,20,16,0.05); border: 1px solid var(--border-soft); }
.routine-outro h3 { font-family: 'Noto Serif Display', serif; font-size: 1.2rem; margin-bottom: 10px; color: var(--text); }
.routine-outro p { font-size: 0.95rem; line-height: 1.7; color: var(--text-mid); }

.routine-loading { text-align: center; padding: 80px 20px; color: var(--text-light); }
.routine-not-found { text-align: center; padding: 80px 20px; }
.routine-not-found h2 { font-family: 'Noto Serif Display', serif; font-size: 1.6rem; margin-bottom: 12px; }
.routine-not-found p { color: var(--text-mid); margin-bottom: 18px; }

@media (max-width: 700px) {
  .routine-hero h1 { font-size: 1.5rem; }
  .routine-hero-content { padding: 22px 22px 24px; }
  .step-card { padding: 20px 20px; }
  .step-body { grid-template-columns: 1fr; gap: 16px; }
  .step-product-img { width: 100%; height: 200px; max-width: 240px; margin: 0 auto; }
  .step-title { font-size: 1.15rem; }
  .step-footer { justify-content: stretch; }
  .btn-amazon { flex: 1; text-align: center; }
}
</style>
</head>
<body>
<div id="siteHeader"></div>
<div id="siteNav"></div>

<div class="routine-container" id="routineContainer">
  <div class="routine-loading">Loading routine...</div>
</div>

<div id="siteFooter"></div>

<script src="/shared.js"></script>
<script>
async function loadRoutine() {
  renderHeader();
  renderNav("routines");
  renderFooter();

  var container = document.getElementById("routineContainer");

  // Skip if SSR already rendered
  if (container.getAttribute("data-ssr") === "true") {
    return;
  }

  var slug = window.location.pathname.replace(/^\/routines\//, "").replace(/\/$/, "");
  if (!slug) {
    container.innerHTML = '<div class="routine-not-found"><h2>Routine Not Found</h2><p>This routine doesn\'t exist.</p><a href="/routines" style="color:var(--accent);">← Back to routines</a></div>';
    return;
  }

  try {
    var resp = await fetch("/data/routines.json");
    if (!resp.ok) throw new Error("No routines data");
    var routines = await resp.json();
    var routine = routines.find(function(r) { return r.slug === slug; });

    if (!routine || routine.status === "draft") {
      container.innerHTML = '<div class="routine-not-found"><h2>Routine Not Found</h2><p>This routine doesn\'t exist or has been removed.</p><a href="/routines" style="color:var(--accent);">← Back to routines</a></div>';
      return;
    }

    document.title = routine.title + " — K Beauty Premium";
    var metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc) metaDesc.content = routine.excerpt || routine.title;

    container.innerHTML = renderRoutineHTML(routine);
  } catch(e) {
    container.innerHTML = '<div class="routine-not-found"><h2>Error Loading Routine</h2><p>Something went wrong.</p><a href="/routines" style="color:var(--accent);">← Back to routines</a></div>';
  }
}

function renderRoutineHTML(r) {
  function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }

  var coverUrl = "";
  if (typeof r.cover === "string") coverUrl = r.cover;
  else if (r.cover && r.cover.url) coverUrl = r.cover.url;

  var heroImg = coverUrl ? '<div class="routine-hero-img"><img src="' + esc(coverUrl) + '" alt="' + esc(r.title) + '"></div>' : '';

  var pills = '<div class="routine-hero-pills">' +
    (r.skinType ? '<span class="routine-pill skin">' + esc(r.skinType) + ' skin</span>' : '') +
    (r.timeOfDay ? '<span class="routine-pill time">' + esc(r.timeOfDay) + '</span>' : '') +
    (r.stepCount ? '<span class="routine-pill meta">' + esc(r.stepCount) + ' steps</span>' : '') +
    (r.duration ? '<span class="routine-pill meta">' + esc(r.duration) + '</span>' : '') +
  '</div>';

  var stepsHTML = (r.steps || []).map(function(s) {
    var imgHTML = s.productImage
      ? '<img src="' + esc(s.productImage) + '" alt="' + esc(s.productName) + '" loading="lazy">'
      : '<div class="empty">📦</div>';
    var tipHTML = s.tip ? '<div class="step-tip"><strong>Tip</strong>' + esc(s.tip) + '</div>' : '';
    var waitHTML = (s.waitTime && parseInt(s.waitTime) > 0)
      ? '<div class="step-wait">Wait <strong>' + esc(s.waitTime) + ' min</strong> before next step</div>'
      : '<div class="step-wait">Continue immediately</div>';
    return '<div class="step-card">' +
      '<div class="step-card-header">' +
        '<div class="step-number">' + esc(s.stepNumber) + '</div>' +
        '<div class="step-title">' + esc(s.title) + '</div>' +
      '</div>' +
      '<div class="step-body">' +
        '<div class="step-product-img">' + imgHTML + '</div>' +
        '<div class="step-info">' +
          '<div class="step-product-name">' + esc(s.productName) + '</div>' +
          '<div class="step-why">' + esc(s.whyThisStep) + '</div>' +
          tipHTML +
        '</div>' +
      '</div>' +
      '<div class="step-footer">' +
        waitHTML +
        (s.productUrl ? '<a href="' + esc(s.productUrl) + '" target="_blank" rel="nofollow noopener" class="btn-amazon">🛒 View on Amazon</a>' : '') +
      '</div>' +
    '</div>';
  }).join("");

  var outroHTML = r.outro ? '<div class="routine-outro"><h3>The Bottom Line</h3><p>' + esc(r.outro) + '</p></div>' : '';

  return '<div class="routine-breadcrumb"><a href="/">Home</a> › <a href="/routines">Routines</a> › <span>' + esc(r.title) + '</span></div>' +
    '<div class="routine-hero">' +
      heroImg +
      '<div class="routine-hero-content">' +
        pills +
        '<h1>' + esc(r.title) + '</h1>' +
        (r.intro ? '<div class="routine-intro">' + esc(r.intro) + '</div>' : '') +
      '</div>' +
    '</div>' +
    '<div class="routine-steps">' + stepsHTML + '</div>' +
    outroHTML;
}

loadRoutine();
</script>
</body>
</html>
