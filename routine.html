<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korean Skincare Routine - K Beauty Premium</title>
<meta name="description" content="">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<style>
.routine-container { max-width: 1100px; margin: 30px auto; padding: 0 16px; }
.routine-breadcrumb { font-size: 0.8rem; color: var(--text-light); margin-bottom: 20px; }
.routine-breadcrumb a { color: var(--accent); text-decoration: none; }

.routine-slider-section { margin: 10px 0 20px; }
.routine-slider-viewport-wrapper { position: relative; }
.routine-slider-viewport { overflow: hidden; position: relative; border-radius: 24px; box-shadow: 0 8px 30px rgba(26,20,16,0.06); }
.routine-slider-track { display: flex; transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1); will-change: transform; align-items: stretch; }

.step-slide { flex: 0 0 100%; width: 100%; box-sizing: border-box; background: linear-gradient(135deg, #FBF7F4 0%, #F8F0EC 100%); min-height: 540px; }

/* HERO slide (slide 1) — vertical layout */
.step-slide.hero-slide { display: block; padding: 0; background: var(--card); overflow: hidden; }
.hero-slide-img { width: 100%; aspect-ratio: 16/9; background: var(--warm-cream); overflow: hidden; }
.hero-slide-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.hero-slide-content { padding: 28px 36px 36px; }
.routine-hero-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.routine-pill { font-size: 0.72rem; padding: 4px 12px; border-radius: 14px; font-weight: 600; letter-spacing: 0.3px; text-transform: capitalize; }
.routine-pill.skin { background: var(--accent-rose-light); color: var(--accent-dark); }
.routine-pill.time { background: var(--champagne); color: var(--gold-deep); }
.routine-pill.meta { background: var(--warm-cream); color: var(--text-mid); }
.hero-slide-content h1 { font-family: 'Noto Serif Display', serif; font-size: 1.9rem; font-weight: 700; line-height: 1.25; color: var(--text); margin: 4px 0 14px; }
.routine-intro { font-size: 0.98rem; line-height: 1.7; color: var(--text-mid); }

/* STEP slide — horizontal layout */
.step-slide:not(.hero-slide):not(.closing-slide) { display: grid; grid-template-columns: 1fr 1.1fr; gap: 32px; padding: 44px 48px; align-items: center; }
.step-slide-img-wrap { background: #FFFFFF; border-radius: 20px; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
.step-slide-img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
.step-slide-img-empty { font-size: 4rem; color: var(--text-light); }
.step-slide-content { display: flex; flex-direction: column; gap: 14px; }
.step-slide-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px; color: var(--accent); text-transform: uppercase; }
.step-slide-title { font-family: 'Noto Serif Display', serif; font-size: 1.55rem; font-weight: 700; line-height: 1.25; color: var(--text); margin: 0; }
.step-slide-why { font-size: 0.92rem; line-height: 1.65; color: var(--text-mid); }
.step-slide-tip { background: rgba(255,255,255,0.7); border-left: 3px solid var(--accent); padding: 12px 16px; border-radius: 8px; font-size: 0.85rem; line-height: 1.55; color: var(--text-mid); }
.step-slide-tip strong { color: var(--accent-dark); display: block; margin-bottom: 3px; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; }
.step-slide-wait { font-size: 0.82rem; color: var(--text-mid); }
.step-slide-wait strong { color: var(--accent); font-weight: 700; }
.step-slide-amazon { display: inline-block; margin-top: 8px; padding: 12px 26px; background: linear-gradient(to bottom, #FFD814, #F7CA00); border: 1px solid #C49A00; border-radius: 50px; color: #111; font-size: 0.9rem; font-weight: 700; font-family: 'Outfit', sans-serif; text-decoration: none; text-align: center; width: fit-content; cursor: pointer; transition: all 0.2s; }
.step-slide-amazon:hover { background: linear-gradient(to bottom, #F7CA00, #E8B900); transform: scale(1.03); }

/* CLOSING slide (last slide) — outro + sources */
.step-slide.closing-slide { display: block; padding: 0; background: var(--card); }
.closing-slide-inner { padding: 44px 48px; display: flex; flex-direction: column; gap: 22px; }
.closing-slide-header { text-align: center; margin-bottom: 8px; }
.closing-slide-header .label { font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px; color: var(--accent); text-transform: uppercase; }
.closing-slide-header h2 { font-family: 'Noto Serif Display', serif; font-size: 1.6rem; margin: 6px 0 0; color: var(--text); }
.closing-section { background: linear-gradient(135deg, #FBF7F4 0%, #F8F0EC 100%); border-radius: 14px; padding: 22px 26px; }
.closing-section h3 { font-family: 'Noto Serif Display', serif; font-size: 1.1rem; margin: 0 0 10px; color: var(--text); }
.closing-section p { font-size: 0.95rem; line-height: 1.7; color: var(--text-mid); margin: 0; }
.closing-section ul { list-style: none; padding: 0; margin: 0; }
.closing-section li { font-size: 0.88rem; line-height: 1.6; padding: 7px 0; border-bottom: 1px solid var(--border-soft); }
.closing-section li:last-child { border-bottom: none; }
.closing-section li a { color: var(--accent); text-decoration: none; word-break: break-word; }
.closing-section li a:hover { color: var(--accent-dark); text-decoration: underline; }
.closing-disclaimer { font-size: 0.82rem; color: var(--text-mid); line-height: 1.6; padding: 14px 16px; background: rgba(255,255,255,0.7); border-left: 3px solid var(--accent); border-radius: 8px; }
.closing-disclaimer strong { color: var(--text); }

/* Side arrows (overlay) */
.routine-arrow-side { position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; background: var(--card); border: 1px solid var(--border-soft); border-radius: 50%; width: 48px; height: 48px; font-size: 1.3rem; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 4px 16px rgba(0,0,0,0.12); font-family: inherit; font-weight: 600; }
.routine-arrow-side:hover:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent); transform: translateY(-50%) scale(1.05); }
.routine-arrow-side:disabled { opacity: 0; pointer-events: none; }
.routine-arrow-side.prev { left: -24px; }
.routine-arrow-side.next { right: -24px; }

/* Dots + counter */
.routine-slider-controls { display: flex; justify-content: center; align-items: center; margin-top: 22px; gap: 18px; flex-wrap: wrap; }
.routine-dots { display: flex; gap: 8px; align-items: center; }
.routine-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-soft); border: none; cursor: pointer; transition: all 0.25s; padding: 0; }
.routine-dot.active { background: var(--accent); width: 28px; border-radius: 12px; }
.routine-step-counter { font-size: 0.85rem; color: var(--text-mid); font-weight: 600; min-width: 60px; text-align: center; }

.routine-loading { text-align: center; padding: 80px 20px; color: var(--text-light); }
.routine-not-found { text-align: center; padding: 80px 20px; }
.routine-not-found h2 { font-family: 'Noto Serif Display', serif; font-size: 1.6rem; margin-bottom: 12px; }

@media (max-width: 900px) {
  .routine-arrow-side.prev { left: 10px; }
  .routine-arrow-side.next { right: 10px; }
  .routine-arrow-side { background: rgba(255,255,255,0.95); }
}
@media (max-width: 800px) {
  .step-slide { min-height: auto; }
  .step-slide:not(.hero-slide):not(.closing-slide) { grid-template-columns: 1fr; padding: 30px 24px; gap: 22px; }
  .step-slide-img-wrap { aspect-ratio: 4/3; max-width: 280px; margin: 0 auto; padding: 22px; }
  .step-slide-title { font-size: 1.3rem; }
  .hero-slide-content h1 { font-size: 1.5rem; }
  .hero-slide-content { padding: 22px 22px 26px; }
  .closing-slide-inner { padding: 28px 22px; }
  .closing-slide-header h2 { font-size: 1.35rem; }
}
@media (max-width: 480px) {
  .step-slide:not(.hero-slide):not(.closing-slide) { padding: 24px 18px; }
  .routine-arrow-side { width: 40px; height: 40px; font-size: 1.1rem; }
}
</style>
</head>
<body>
<div id="siteHeader"></div>
<div id="siteNav"></div>

<div class="routine-container" id="routineContainer">
  <div class="routine-loading">Loading routine...</div>
</div>

<div id="siteFooter"></div>

<script src="/shared.js"></script>
<script>
async function loadRoutine() {
  renderHeader();
  renderNav("routines");
  renderFooter();

  var container = document.getElementById("routineContainer");

  if (container.getAttribute("data-ssr") === "true") {
    initRoutineSlider();
    return;
  }

  var slug = window.location.pathname.replace(/^\/routines\//, "").replace(/\/$/, "");
  if (!slug) {
    container.innerHTML = '<div class="routine-not-found"><h2>Routine Not Found</h2><p>This routine does not exist.</p><a href="/routines" style="color:var(--accent);">Back to routines</a></div>';
    return;
  }

  try {
    var resp = await fetch("/data/routines.json");
    if (!resp.ok) throw new Error("No routines data");
    var routines = await resp.json();
    var routine = routines.find(function(r) { return r.slug === slug; });

    if (!routine || routine.status === "draft") {
      container.innerHTML = '<div class="routine-not-found"><h2>Routine Not Found</h2><p>This routine does not exist or has been removed.</p><a href="/routines" style="color:var(--accent);">Back to routines</a></div>';
      return;
    }

    document.title = routine.title + " - K Beauty Premium";
    var metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc) metaDesc.content = routine.excerpt || routine.title;

    container.innerHTML = renderRoutineHTML(routine);
    initRoutineSlider();
  } catch(e) {
    container.innerHTML = '<div class="routine-not-found"><h2>Error Loading Routine</h2><p>Something went wrong.</p><a href="/routines" style="color:var(--accent);">Back to routines</a></div>';
  }
}

function renderRoutineHTML(r) {
  function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }

  var coverUrl = "";
  if (typeof r.cover === "string") coverUrl = r.cover;
  else if (r.cover && r.cover.url) coverUrl = r.cover.url;

  // Hero slide
  var heroImg = coverUrl ? '<div class="hero-slide-img"><img src="' + esc(coverUrl) + '" alt="' + esc(r.title) + '"></div>' : '';
  var pills = '<div class="routine-hero-pills">' +
    (r.skinType ? '<span class="routine-pill skin">' + esc(r.skinType) + ' skin</span>' : '') +
    (r.timeOfDay ? '<span class="routine-pill time">' + esc(r.timeOfDay) + '</span>' : '') +
    (r.stepCount ? '<span class="routine-pill meta">' + esc(r.stepCount) + ' steps</span>' : '') +
    (r.duration ? '<span class="routine-pill meta">' + esc(r.duration) + '</span>' : '') +
  '</div>';
  var heroSlide = '<div class="step-slide hero-slide">' +
    heroImg +
    '<div class="hero-slide-content">' +
      pills +
      '<h1>' + esc(r.title) + '</h1>' +
      (r.intro ? '<div class="routine-intro">' + esc(r.intro) + '</div>' : '') +
    '</div>' +
  '</div>';

  // Step slides
  var stepSlides = (r.steps || []).map(function(s) {
    var imgHTML = s.productImage
      ? '<img src="' + esc(s.productImage) + '" alt="' + esc(s.productName) + '" loading="lazy">'
      : '<div class="step-slide-img-empty">[product]</div>';
    var tipHTML = s.tip ? '<div class="step-slide-tip"><strong>Tip</strong>' + esc(s.tip) + '</div>' : '';
    var waitNum = parseInt(s.waitTime) || 0;
    var waitHTML = waitNum > 0
      ? '<div class="step-slide-wait">Wait <strong>' + esc(s.waitTime) + ' min</strong> before next step</div>'
      : '<div class="step-slide-wait">Continue immediately</div>';
    var btnHTML = s.productUrl
      ? '<a href="' + esc(s.productUrl) + '" target="_blank" rel="nofollow noopener" class="step-slide-amazon">View on Amazon</a>'
      : '';
    return '<div class="step-slide">' +
      '<div class="step-slide-img-wrap">' + imgHTML + '</div>' +
      '<div class="step-slide-content">' +
        '<div class="step-slide-label">STEP ' + esc(s.stepNumber) + ' - ' + esc(s.title) + '</div>' +
        '<h2 class="step-slide-title">' + esc(s.productName) + '</h2>' +
        '<div class="step-slide-why">' + esc(s.whyThisStep) + '</div>' +
        tipHTML +
        waitHTML +
        btnHTML +
      '</div>' +
    '</div>';
  }).join("");

  // Closing slide (outro + sources)
  var closingSlide = "";
  var hasOutro = r.outro && r.outro.trim();
  var hasSources = r.sources && r.sources.trim();
  if (hasOutro || hasSources) {
    var outroBlock = hasOutro ? '<div class="closing-section"><h3>The Bottom Line</h3><p>' + esc(r.outro) + '</p></div>' : '';
    var sourcesBlock = '';
    if (hasSources) {
      var lines = r.sources.split(/\n/).map(function(l) { return l.trim(); }).filter(Boolean);
      var items = lines.map(function(line) {
        var urlMatch = line.match(/(https?:\/\/\S+)/);
        if (urlMatch) {
          var url = urlMatch[1];
          var label = line.replace(url, "").replace(/[\s:-]+$/, "").trim() || url;
          return '<li><a href="' + esc(url) + '" target="_blank" rel="noopener nofollow">' + esc(label) + '</a></li>';
        }
        return '<li>' + esc(line) + '</li>';
      }).join("");
      sourcesBlock = '<div class="closing-section"><h3>Sources &amp; References</h3><ul>' + items + '</ul></div>';
    }
    var disclaimerBlock = '<div class="closing-disclaimer"><strong>Not medical advice.</strong> General skincare guidance for educational purposes. Patch test new products. Consult a dermatologist for persistent concerns or specific conditions.</div>';
    closingSlide = '<div class="step-slide closing-slide">' +
      '<div class="closing-slide-inner">' +
        '<div class="closing-slide-header"><div class="label">Routine Complete</div><h2>You finished the routine</h2></div>' +
        outroBlock +
        sourcesBlock +
        disclaimerBlock +
      '</div>' +
    '</div>';
  }

  return '<div class="routine-breadcrumb"><a href="/">Home</a> &rsaquo; <a href="/routines">Routines</a> &rsaquo; <span>' + esc(r.title) + '</span></div>' +
    '<div class="routine-slider-section">' +
      '<div class="routine-slider-viewport-wrapper">' +
        '<div class="routine-slider-viewport">' +
          '<div class="routine-slider-track" id="routineSliderTrack">' + heroSlide + stepSlides + closingSlide + '</div>' +
        '</div>' +
        '<button class="routine-arrow-side prev" id="routinePrev" aria-label="Previous">&larr;</button>' +
        '<button class="routine-arrow-side next" id="routineNext" aria-label="Next">&rarr;</button>' +
      '</div>' +
      '<div class="routine-slider-controls">' +
        '<div class="routine-dots" id="routineDots"></div>' +
        '<span class="routine-step-counter" id="routineCounter"></span>' +
      '</div>' +
    '</div>';
}

function initRoutineSlider() {
  var track = document.getElementById("routineSliderTrack");
  var prev = document.getElementById("routinePrev");
  var next = document.getElementById("routineNext");
  var dots = document.getElementById("routineDots");
  var counter = document.getElementById("routineCounter");

  if (!track || !prev || !next) return;

  var slides = track.querySelectorAll(".step-slide");
  var totalSlides = slides.length;
  if (totalSlides === 0) return;

  var stepSlideEls = track.querySelectorAll(".step-slide:not(.hero-slide):not(.closing-slide)");
  var totalSteps = stepSlideEls.length;

  var currentIndex = 0;

  if (dots) {
    var dotsHTML = "";
    for (var i = 0; i < totalSlides; i++) {
      dotsHTML += '<button class="routine-dot' + (i === 0 ? ' active' : '') + '" data-slide="' + i + '" aria-label="Go to slide ' + (i+1) + '"></button>';
    }
    dots.innerHTML = dotsHTML;
  }

  function goToSlide(index) {
    if (index < 0 || index >= totalSlides) return;
    currentIndex = index;
    track.style.transform = "translateX(-" + (index * 100) + "%)";
    if (dots) {
      var allDots = dots.querySelectorAll(".routine-dot");
      for (var j = 0; j < allDots.length; j++) {
        if (j === index) allDots[j].classList.add("active");
        else allDots[j].classList.remove("active");
      }
    }
    prev.disabled = (index === 0);
    next.disabled = (index === totalSlides - 1);
    if (counter) {
      var current = slides[index];
      if (current.classList.contains("hero-slide")) counter.textContent = "Overview";
      else if (current.classList.contains("closing-slide")) counter.textContent = "Summary";
      else counter.textContent = "Step " + index + " of " + totalSteps;
    }
  }

  prev.addEventListener("click", function() { goToSlide(currentIndex - 1); });
  next.addEventListener("click", function() { goToSlide(currentIndex + 1); });

  if (dots) {
    dots.addEventListener("click", function(e) {
      var btn = e.target.closest(".routine-dot");
      if (!btn) return;
      var idx = parseInt(btn.dataset.slide, 10);
      goToSlide(idx);
    });
  }

  document.addEventListener("keydown", function(e) {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    if (e.key === "ArrowLeft") { e.preventDefault(); goToSlide(currentIndex - 1); }
    else if (e.key === "ArrowRight") { e.preventDefault(); goToSlide(currentIndex + 1); }
  });

  var touchStartX = 0;
  var touchEndX = 0;
  track.addEventListener("touchstart", function(e) {
    touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });
  track.addEventListener("touchend", function(e) {
    touchEndX = e.changedTouches[0].screenX;
    var diff = touchStartX - touchEndX;
    if (Math.abs(diff) > 50) {
      if (diff > 0) goToSlide(currentIndex + 1);
      else goToSlide(currentIndex - 1);
    }
  }, { passive: true });

  goToSlide(0);
}

loadRoutine();
</script>
</body>
</html>
