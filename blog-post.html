<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Post — K Beauty Premium</title>
<meta name="description" content="">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<style>
.post-container { max-width: 780px; margin: 30px auto; padding: 0 16px; }
.post-breadcrumb { font-size: 0.8rem; color: var(--text-light); margin-bottom: 16px; }
.post-breadcrumb a { color: var(--accent); text-decoration: none; }
.post-date { font-size: 0.75rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
.post-title { font-family: 'Noto Serif Display', serif; font-size: 2.2rem; font-weight: 700; margin: 8px 0 16px; line-height: 1.25; }
.post-tags { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.post-tag { font-size: 0.7rem; background: var(--accent-light); color: var(--accent); padding: 3px 12px; border-radius: 20px; font-weight: 500; }
.post-cover { width: 100%; border-radius: 12px; margin-bottom: 28px; max-height: 420px; object-fit: cover; }
.post-content { font-size: 1.05rem; line-height: 1.8; color: var(--text); }
.post-content h2 { font-family: 'Noto Serif Display', serif; font-size: 1.5rem; margin: 32px 0 12px; color: var(--text); }
.post-content h3 { font-family: 'Noto Serif Display', serif; font-size: 1.2rem; margin: 24px 0 10px; color: var(--text); }
.post-content h4 { font-family: 'Outfit', sans-serif; font-size: 1.05rem; font-weight: 600; margin: 20px 0 8px; color: var(--text); }
.post-content p { margin: 0 0 16px; }
.post-content img { max-width: 100%; border-radius: 10px; margin: 16px 0; }
.post-content ul, .post-content ol { margin: 0 0 16px; padding-left: 24px; }
.post-content li { margin-bottom: 6px; }
.post-content a { color: var(--accent); text-decoration: underline; }
.post-content blockquote { border-left: 3px solid var(--accent); padding: 12px 20px; margin: 16px 0; background: var(--accent-light); border-radius: 0 8px 8px 0; font-style: italic; color: var(--text-mid); }
.post-content strong { font-weight: 600; }
.post-content .table-responsive { overflow-x: auto; margin: 20px 0; border-radius: 10px; border: 1px solid var(--border); }
.post-content table { width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 400px; }
.post-content thead { background: linear-gradient(135deg, #C4956A, #D4A08C); }
.post-content th { padding: 12px 16px; text-align: left; color: #fff; font-weight: 600; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.3px; }
.post-content td { padding: 10px 16px; border-bottom: 1px solid var(--border); color: var(--text); }
.post-content tbody tr:hover { background: var(--accent-light); }
.post-content tbody tr:last-child td { border-bottom: none; }
 /* ─────────────────────────────────────────────────────────
   BLOG POST TABLES — clean version
   Targets <thead><th> for header, <tbody><td> for body.
   ───────────────────────────────────────────────────────── */

.post-content table {
  width: 100% !important;
  table-layout: fixed !important;
  border-collapse: collapse !important;
  margin: 24px 0 !important;
  border-radius: 10px !important;
  overflow: hidden !important;
  border: none !important;
  background: #fff !important;
}

/* HEADER — only <thead> and only <th> cells */
.post-content table thead {
  background: linear-gradient(135deg, #C4956A, #D4A08C) !important;
}

.post-content table thead th {
  background: transparent !important;
  color: #ffffff !important;
  font-weight: 600 !important;
  text-align: left !important;
  padding: 14px 16px !important;
  border: none !important;
  font-size: 0.78rem !important;
  text-transform: uppercase !important;
  letter-spacing: 0.4px !important;
  vertical-align: middle !important;
  word-break: break-word !important;
}

/* BODY cells — only <td> inside <tbody> */
.post-content table tbody td {
  background: #fff !important;
  color: var(--text) !important;
  padding: 14px 16px !important;
  border: none !important;
  border-bottom: 1px solid var(--border) !important;
  vertical-align: middle !important;
  word-break: break-word !important;
  font-size: 0.92rem !important;
  text-transform: none !important;
  font-weight: 400 !important;
  letter-spacing: normal !important;
  line-height: 1.5 !important;
}

/* Last body row — no border */
.post-content table tbody tr:last-child td {
  border-bottom: none !important;
}

/* Hover ONLY on body rows */
.post-content table tbody tr:hover td {
  background: #FFF8F0 !important;
}

/* Product cards inside table cells — compact vertical layout */
.post-content table tbody td .kb-product-card {
  display: block !important;
  padding: 10px !important;
  margin: 0 !important;
  box-shadow: none !important;
  border: 1px solid #f0f0f0 !important;
  background: #fff !important;
  text-align: center !important;
}
.post-content table tbody td .kb-product-card > a:first-child {
  display: block !important;
  margin: 0 auto 8px !important;
}
.post-content table tbody td .kb-product-card > a:first-child img {
  width: 80px !important;
  height: 80px !important;
  margin: 0 auto !important;
}
.post-content table tbody td .kb-product-card > div {
  text-align: center !important;
  margin-bottom: 8px !important;
}
.post-content table tbody td .kb-product-card > div > a > div {
  font-size: 0.78rem !important;
  line-height: 1.3 !important;
}
.post-content table tbody td .kb-product-card > a:last-child {
  display: inline-block !important;
  width: auto !important;
  font-size: 0.72rem !important;
  padding: 6px 14px !important;
  margin: 4px auto 0 !important;
}

/* Mobile — horizontal scroll */
@media (max-width: 768px) {
  .post-content table {
    display: block !important;
    overflow-x: auto !important;
    -webkit-overflow-scrolling: touch !important;
  }
  .post-content table td,
  .post-content table th {
    min-width: 120px !important;
  }
}
.post-content .table-total { background: #FFF8F0; font-weight: 600; }
.post-content .table-total td { border-top: 2px solid var(--accent); }
.post-nav { display: flex; justify-content: space-between; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); }
.post-nav a { color: var(--accent); text-decoration: none; font-weight: 500; }
.post-loading { text-align: center; padding: 80px 20px; color: var(--text-light); }
.post-not-found { text-align: center; padding: 80px 20px; }
.post-not-found h2 { font-family: 'Noto Serif Display', serif; margin-bottom: 12px; }
@media (max-width: 768px) {
  .post-title { font-size: 1.6rem; }
  .post-content { font-size: 0.95rem; }
}
</style>
</head>
<body>
<div id="siteHeader"></div>
<div id="siteNav"></div>

<div class="post-container" id="postContainer">
  <div class="post-loading">Loading post...</div>
</div>

<div id="siteFooter"></div>

<script src="/shared.js"></script>
<script>
// Simple Markdown-to-HTML converter
function markdownToHTML(md) {
  var html = md;
  // TikTok embeds
  html = html.replace(/(?:^|\n)(https?:\/\/(?:www\.)?tiktok\.com\/@[^\/]+\/video\/(\d+)[^\s]*)/gm, function(match, url, videoId) {
    return '<div style="max-width:325px;margin:16px auto;"><iframe src="https://www.tiktok.com/player/v1/' + videoId + '?music_info=0&description=0" style="width:100%;height:580px;border:none;border-radius:12px;" allowfullscreen allow="encrypted-media"></iframe></div>';
  });
  
  // Tables - convert markdown tables to responsive HTML tables
  html = html.replace(/(?:^|\n)((?:\|[^\n]+\|\n?)+)/gm, function(match, tableBlock) {
    var rows = tableBlock.trim().split('\n').filter(function(r) { return r.trim(); });
    if (rows.length < 2) return match;
    
    var parseRow = function(row) {
      return row.split('|').filter(function(c, i, arr) { return i > 0 && i < arr.length - 1; }).map(function(c) { return c.trim(); });
    };
    
    // Check if row 2 is separator (---|---|---)
    var hasSeparator = /^\|[\s\-:]+\|/.test(rows[1]);
    var headerCells = parseRow(rows[0]);
    var startIdx = hasSeparator ? 2 : 1;
    
    var tableHTML = '<div class="table-responsive"><table><thead><tr>';
    headerCells.forEach(function(cell) { tableHTML += '<th>' + cell + '</th>'; });
    tableHTML += '</tr></thead><tbody>';
    
    for (var i = startIdx; i < rows.length; i++) {
      var cells = parseRow(rows[i]);
      if (cells.length === 0) continue;
      var isTotal = cells.join('').toLowerCase().indexOf('total') !== -1;
      tableHTML += '<tr' + (isTotal ? ' class="table-total"' : '') + '>';
      cells.forEach(function(cell) {
        // Apply inline markdown (bold, italic)
        cell = cell.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        cell = cell.replace(/\*(.+?)\*/g, '<em>$1</em>');
        tableHTML += '<td>' + cell + '</td>';
      });
      tableHTML += '</tr>';
    }
    tableHTML += '</tbody></table></div>';
    return tableHTML;
  });
  
  // H4 support
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
  // Bold + italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Images
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" loading="lazy">');
  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // Blockquote
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // Unordered list
  html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  // Ordered list
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Horizontal rule
  html = html.replace(/^---+$/gm, '<hr>');
  // Paragraphs - handle both \n\n and single \n after headings
  var blocks = html.split(/\n{2,}|\n(?=<h[2-4])|(?<=<\/h[2-4]>)\n/);
  html = blocks.map(function(block) {
    block = block.trim();
    if (!block) return '';
    if (block.startsWith('<h') || block.startsWith('<ul') || block.startsWith('<ol') || block.startsWith('<blockquote') || block.startsWith('<hr') || block.startsWith('<img') || block.startsWith('<div') || block.startsWith('<table')) return block;
    if (!block.startsWith('<')) return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
    return block;
  }).join('\n');
  return html;
}

async function loadBlogPost() {
  renderHeader();
  renderNav("blog");
  renderFooter();

  var container = document.getElementById("postContainer");
  var slug = window.location.pathname.replace(/^\/blog\//, "").replace(/\/$/, "");

  if (!slug) {
    container.innerHTML = '<div class="post-not-found"><h2>Post Not Found</h2><p>This post doesn\'t exist.</p><a href="/blog" style="color:var(--accent);">← Back to Blog</a></div>';
    return;
  }

  try {
    var resp = await fetch("/data/blog.json");
    if (!resp.ok) throw new Error("No blog data");
    var posts = await resp.json();
    posts.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
    
    var post = posts.find(function(p) { return p.slug === slug; });
    if (!post || post.status === "draft") {
      container.innerHTML = '<div class="post-not-found"><h2>Post Not Found</h2><p>This post doesn\'t exist or has been removed.</p><a href="/blog" style="color:var(--accent);">← Back to Blog</a></div>';
      return;
    }

    // Update page meta
    document.title = post.title + " — K Beauty Premium Blog";
    var metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc) metaDesc.content = post.excerpt || post.title;

    // Blog post schema
    var postSchema = document.createElement("script");
    postSchema.type = "application/ld+json";
    postSchema.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": post.title,
      "description": post.excerpt || "",
      "image": post.cover || "",
      "datePublished": post.date,
      "author": { "@type": "Organization", "name": "K Beauty Premium" },
      "publisher": { "@type": "Organization", "name": "K Beauty Premium" }
    });
    document.head.appendChild(postSchema);

    var dateStr = post.date ? new Date(post.date).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" }) : "";
    var tagsHTML = (post.tags || []).map(function(t) { return '<span class="post-tag">' + t + '</span>'; }).join("");
    var coverHTML = post.cover ? '<img src="' + post.cover + '" alt="' + post.title + '" class="post-cover">' : '';
    var contentHTML = markdownToHTML(post.content || "");

    // Find prev/next posts
    var idx = posts.indexOf(post);
    var prev = idx < posts.length - 1 ? posts[idx + 1] : null;
    var next = idx > 0 ? posts[idx - 1] : null;
    var navHTML = '<div class="post-nav">';
    navHTML += prev ? '<a href="/blog/' + prev.slug + '">← ' + prev.title.substring(0, 40) + '...</a>' : '<span></span>';
    navHTML += next ? '<a href="/blog/' + next.slug + '">' + next.title.substring(0, 40) + '... →</a>' : '<span></span>';
    navHTML += '</div>';

    container.innerHTML = 
      '<div class="post-breadcrumb"><a href="/">Home</a> › <a href="/blog">Blog</a> › <span>' + post.title.substring(0, 50) + '...</span></div>' +
      '<div class="post-date">' + dateStr + '</div>' +
      '<h1 class="post-title">' + post.title + '</h1>' +
      (tagsHTML ? '<div class="post-tags">' + tagsHTML + '</div>' : '') +
      coverHTML +
      '<div class="post-content">' + contentHTML + '</div>' +
      navHTML;

  } catch(e) {
    container.innerHTML = '<div class="post-not-found"><h2>Error Loading Post</h2><p>Something went wrong.</p><a href="/blog" style="color:var(--accent);">← Back to Blog</a></div>';
  }
}
loadBlogPost();
</script>
</body>
</html>
