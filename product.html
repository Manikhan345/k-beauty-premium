<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — K Beauty Premium</title>
<meta name="description" content="Shop top-rated Korean beauty products at K Beauty Premium.">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.breadcrumb { max-width: 1200px; margin: 16px auto 0; padding: 0 16px; font-size: 0.8rem; color: var(--text-light); }
.breadcrumb a { color: var(--accent); text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }

.product-detail { max-width: 1200px; margin: 24px auto; padding: 0 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }

.product-image-main { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 30px; display: flex; align-items: center; justify-content: center; min-height: 400px; }
.product-image-main img { max-width: 100%; max-height: 450px; object-fit: contain; }
.product-image-main .placeholder-icon { font-size: 5rem; opacity: 0.15; }

.product-info { display: flex; flex-direction: column; gap: 12px; }
.product-info .badge-wrap { display: flex; gap: 8px; flex-wrap: wrap; }
.product-info .badge { display: inline-block; padding: 4px 12px; border-radius: 5px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; color: #fff; }
.product-info h1 { font-family: 'Noto Serif Display', serif; font-size: 1.6rem; font-weight: 600; line-height: 1.4; color: var(--text); }
.product-info .rating-row { display: flex; align-items: center; gap: 8px; }
.product-info .stars { color: var(--gold); font-size: 1rem; letter-spacing: 1px; }
.product-info .rating-num { font-size: 0.95rem; font-weight: 600; color: var(--text); }
.product-info .review-count { font-size: 0.85rem; color: var(--text-light); }
.product-info .bought-tag { font-size: 0.85rem; color: #C45500; font-weight: 600; }
.product-info .price-row { display: flex; align-items: baseline; gap: 10px; }
.product-info .price { font-size: 2rem; font-weight: 700; color: var(--text); }
.product-info .old-price { font-size: 1.1rem; color: var(--text-light); text-decoration: line-through; }
.product-info .discount { font-size: 0.9rem; color: var(--badge-hot); font-weight: 600; }
.product-info .price-note { font-size: 0.75rem; color: var(--text-light); }
.product-info .prime-tag { font-size: 0.85rem; color: #2E7EBF; font-weight: 500; }
.product-info .tag-row { display: flex; gap: 6px; flex-wrap: wrap; }
.product-info .tag-pill { padding: 4px 12px; border: 1px solid var(--border); border-radius: 16px; font-size: 0.75rem; color: var(--text-mid); background: var(--accent-light); }

.btn-amazon { display: block; width: 100%; max-width: 400px; padding: 16px; background: linear-gradient(to bottom, #FFD814, #F7CA00); border: 1px solid #C49A00; border-radius: 50px; color: #111; font-size: 1rem; font-weight: 700; font-family: 'Outfit', sans-serif; text-align: center; text-decoration: none; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
.btn-amazon:hover { background: linear-gradient(to bottom, #F7CA00, #E8B900); transform: scale(1.02); }

.btn-category { display: inline-block; padding: 10px 24px; background: var(--card); border: 1px solid var(--border); border-radius: 50px; color: var(--accent-dark); font-size: 0.85rem; font-weight: 600; text-decoration: none; transition: all 0.2s; }
.btn-category:hover { background: var(--accent-light); border-color: var(--accent); }

.divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

/* Related Products */
.related-section { max-width: 1200px; margin: 40px auto; padding: 0 16px; }
.related-section h2 { font-family: 'Noto Serif Display', serif; font-size: 1.4rem; font-weight: 600; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 2px solid var(--accent-light); }
.related-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; }
.related-grid .product-card { max-width: 280px; }

/* Loading */
.loading-detail { max-width: 1200px; margin: 24px auto; padding: 0 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
.loading-img { height: 400px; background: linear-gradient(110deg, var(--warm-cream) 8%, #f8f4ef 18%, var(--warm-cream) 33%); border-radius: var(--radius); background-size: 200% 100%; animation: shimmer 1.5s linear infinite; }
.loading-info { display: flex; flex-direction: column; gap: 16px; }
.loading-bar { height: 20px; background: linear-gradient(110deg, var(--warm-cream) 8%, #f8f4ef 18%, var(--warm-cream) 33%); border-radius: 6px; background-size: 200% 100%; animation: shimmer 1.5s linear infinite; }
.loading-bar.w60 { width: 60%; }
.loading-bar.w40 { width: 40%; }
.loading-bar.w80 { width: 80%; height: 30px; }
@keyframes shimmer { to { background-position-x: -200%; } }

/* Not found */
.not-found { max-width: 600px; margin: 80px auto; padding: 0 16px; text-align: center; }
.not-found h2 { font-family: 'Noto Serif Display', serif; font-size: 1.6rem; margin-bottom: 12px; }
.not-found p { color: var(--text-mid); margin-bottom: 20px; }

@media (max-width: 768px) {
  .product-detail { grid-template-columns: 1fr; gap: 20px; }
  .product-image-main { min-height: 280px; }
  .product-info h1 { font-size: 1.2rem; }
  .product-info .price { font-size: 1.6rem; }
  .related-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
@media (max-width: 480px) {
  .related-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="siteHeader"></div>
<div id="siteNav"></div>

<div id="breadcrumb" class="breadcrumb"></div>
<div id="productContent">
  <div class="loading-detail">
    <div class="loading-img"></div>
    <div class="loading-info">
      <div class="loading-bar w80"></div>
      <div class="loading-bar w60"></div>
      <div class="loading-bar w40"></div>
      <div class="loading-bar w60"></div>
      <div class="loading-bar w80" style="height:50px;"></div>
    </div>
  </div>
</div>

<div class="related-section" id="relatedSection" style="display:none;">
  <h2>You Might Also Like</h2>
  <div class="related-grid" id="relatedGrid"></div>
</div>

<div id="siteFooter"></div>

<script src="shared.js"></script>
<script>
renderHeader();

async function initProductPage() {
  await loadConfig();
  renderNav("", "");
  renderFooter();

  // Get URL params - support both clean URL (/p/cat/id) and query params (?cat=x&id=y)
  var cat = null, productId = null;
  var path = window.location.pathname;
  var pathMatch = path.match(/\/p\/([^\/]+)\/([^\/]+)/);
  if (pathMatch) {
    cat = pathMatch[1];
    productId = pathMatch[2];
  } else {
    var params = new URLSearchParams(window.location.search);
    cat = params.get("cat");
    productId = params.get("id");
    // Redirect old URL to clean URL
    if (cat && productId) {
      window.history.replaceState(null, "", "/p/" + cat + "/" + productId);
    }
  }

  if (!cat || !productId) {
    showNotFound();
    return;
  }

  // Load products for this category
  var meta = CATEGORY_META[cat];
  if (!meta) {
    showNotFound();
    return;
  }

  var products = await fetchProducts(meta.file);
  var product = products.find(function(p) { return p.id === productId; });

  if (!product) {
    showNotFound();
    return;
  }

  // Update page title and meta
  document.title = product.name + " — K Beauty Premium";
  var metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc) metaDesc.content = product.name + " - Shop at K Beauty Premium. " + (product.rating ? product.rating + " stars" : "") + " from $" + product.price.toFixed(2);

  // Breadcrumb
  var catLabel = meta.title.replace(/^[^\w]*/, "").trim();
  document.getElementById("breadcrumb").innerHTML =
    '<a href="/">Home</a> › ' +
    '<a href="/' + cat + '">' + catLabel + '</a>' +
    (product.tag ? ' › <span>' + product.tag + '</span>' : '') +
    ' › <span>' + product.name.substring(0, 50) + '...</span>';

  // Render product
  renderProductDetail(product, cat);

  // Related products (same category, exclude current)
  var related = products.filter(function(p) {
    return p.id !== productId;
  });
  // Prefer same tag
  var sameTag = related.filter(function(p) { return p.tag === product.tag; });
  var others = related.filter(function(p) { return p.tag !== product.tag; });
  var relatedList = sameTag.concat(others).slice(0, 8);

  if (relatedList.length > 0) {
    document.getElementById("relatedSection").style.display = "";
    document.getElementById("relatedGrid").innerHTML = relatedList.map(function(p) {
      return renderProductCard(p);
    }).join("");

    // Make related product cards link to product pages
    document.querySelectorAll("#relatedGrid .product-card").forEach(function(card) {
      var name = card.querySelector(".product-name").textContent;
      var relProd = relatedList.find(function(p) { return p.name === name; });
      if (relProd) {
        card.style.cursor = "pointer";
        card.addEventListener("click", function(e) {
          if (e.target.classList.contains("buy-btn")) return;
          window.location.href = "/p/" + cat + "/" + relProd.id;
        });
      }
    });
  }
}

function renderProductDetail(p, cat) {
  // Rating stars
  var r = parseFloat(p.rating) || 0;
  var rounded = (r % 1 < 0.25) ? Math.floor(r) : (r % 1 < 0.75) ? Math.floor(r) + 0.5 : Math.ceil(r);
  var full = Math.floor(rounded);
  var half = (rounded % 1 !== 0) ? 1 : 0;
  var empty = 5 - full - half;
  var starsHTML = '<span style="color:#F5A623">' + "★".repeat(full) + '</span>' + (half ? '<span class="star-half">★</span>' : '') + '<span style="color:#ddd">' + "★".repeat(empty) + '</span>';

  // Badge
  var badgeHTML = '';
  if (p.badge) {
    var badgeClass = BADGE_MAP[p.badge] || '';
    var bgColor = getComputedStyle(document.documentElement).getPropertyValue('--' + badgeClass.replace('badge-', 'badge-')) || '#999';
    badgeHTML = '<div class="badge-wrap"><span class="badge ' + badgeClass + '">' + p.badge + '</span></div>';
  }

  // Price
  var priceHTML = '<span class="price">$' + p.price.toFixed(2) + '</span>';
  if (p.originalPrice) {
    var discount = Math.round((1 - p.price / p.originalPrice) * 100);
    priceHTML += '<span class="old-price">$' + p.originalPrice.toFixed(2) + '</span>';
    priceHTML += '<span class="discount">-' + discount + '% off</span>';
  }

  // Image
  var imgHTML = (p.image && p.image.trim())
    ? '<img src="' + p.image + '" alt="' + p.name + '">'
    : '<div class="placeholder-icon">📦</div>';

  // Tags
  var tagHTML = '';
  if (p.tag || p.subtag) {
    tagHTML = '<div class="tag-row">';
    if (p.tag) tagHTML += '<span class="tag-pill">' + p.tag + '</span>';
    if (p.subtag) tagHTML += '<span class="tag-pill">' + p.subtag + '</span>';
    tagHTML += '</div>';
  }

  var catMeta = CATEGORY_META[cat];
  var catLabel = catMeta ? catMeta.title.replace(/^[^\w]*/, "").trim() : cat;

  document.getElementById("productContent").innerHTML =
    '<div class="product-detail">' +
      '<div class="product-image-main">' + imgHTML + '</div>' +
      '<div class="product-info">' +
        badgeHTML +
        '<h1>' + p.name + '</h1>' +
        '<div class="rating-row">' +
          '<span class="stars">' + starsHTML + '</span>' +
          '<span class="rating-num">' + r + '</span>' +
          '<span class="review-count">(' + (p.reviews || '0') + ' reviews)</span>' +
        '</div>' +
        (p.bought ? '<div class="bought-tag">' + p.bought + '</div>' : '') +
        '<hr class="divider">' +
        '<div class="price-row">' + priceHTML + '</div>' +
        '<div class="price-note">*Price may vary on Amazon</div>' +
        (p.prime ? '<div class="prime-tag">✓ Prime FREE Delivery</div>' : '') +
        '<hr class="divider">' +
        tagHTML +
        '<a href="' + (p.url || '#') + '" class="btn-amazon" target="_blank" rel="nofollow noopener">🛒 View on Amazon</a>' +
        '<a href="/' + cat + '" class="btn-category">← Browse more ' + catLabel + '</a>' +
      '</div>' +
    '</div>';
}

function showNotFound() {
  document.getElementById("productContent").innerHTML =
    '<div class="not-found">' +
      '<h2>Product Not Found</h2>' +
      '<p>Sorry, we couldn\'t find this product. It may have been removed or the link is incorrect.</p>' +
      '<a href="/" class="btn-category">← Back to Home</a>' +
    '</div>';
}

initProductPage();
</script>
</body>
</html>
